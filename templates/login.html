{% extends "base.html" %}

{% block title %}Login - STAE{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Login do Operador</h1>
    <p class="subtitle">Aceda ao sistema de registo de acessos do STAE.</p>

    {% if erro %}
    <div class="alert alert-erro">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="form">
        <div class="form-group">
            <label for="usuario">Utilizador</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ex: admin" required autofocus>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite a senha" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

</section>
{% endblock %}
